kind = "web"
previewPath = "/"
title = "Livestream Studio"
version = "1.0.0"
id = "artifacts/livestream-studio"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19108

[services.development]
run = "pnpm --filter @workspace/livestream-studio run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/livestream-studio", "run", "build" ]
serve = "static"
publicDir = "artifacts/livestream-studio/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19108"
BASE_PATH = "/"
